definitions:
  filler_internal_dto.BindParamRequest:
    properties:
      component_id:
        example: 10
        type: integer
      param_id:
        example: 5
        type: integer
    required:
    - component_id
    - param_id
    type: object
  filler_internal_dto.ComponentCreate:
    properties:
      access:
        example: ADMIN
        type: string
      base_component:
        example: 1
        type: integer
      description_en:
        example: Main power controller unit
        type: string
      description_ru:
        example: Главный контроллер питания
        type: string
